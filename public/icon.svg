<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Latar penuh oranye (full-bleed, aman untuk ikon maskable) -->
  <rect width="512" height="512" fill="#E8532B"/>

  <!-- Piringan hitam -->
  <circle cx="256" cy="256" r="184" fill="#14110E"/>

  <!-- Alur-alur piringan -->
  <circle cx="256" cy="256" r="184" fill="none" stroke="#2A231D" stroke-width="3"/>
  <circle cx="256" cy="256" r="156" fill="none" stroke="#2A231D" stroke-width="3"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#2A231D" stroke-width="3"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#2A231D" stroke-width="3"/>

  <!-- Label tengah oranye -->
  <circle cx="256" cy="256" r="66" fill="#E8532B"/>

  <!-- Lubang spindle -->
  <circle cx="256" cy="256" r="15" fill="#14110E"/>

  <!-- Kilau highlight halus di piringan -->
  <path d="M 130 170 A 184 184 0 0 1 250 76" fill="none" stroke="#3A322A" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
</svg>
