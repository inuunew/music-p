<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Dashboard Clone</title>
  <style>
    :root { --bg-base: #121212; --bg-surface: #181818; --bg-highlight: #282828; --text-main: #ffffff; --text-muted: #b3b3b3; --spotify-green: #1db954; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-base); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 280px; background-color: #000; padding: 20px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
    #main-content { flex: 1; padding: 30px; overflow-y: auto; background: linear-gradient(to bottom, #222, var(--bg-base) 40%); }
    .search-box { display: flex; gap: 10px; width: 100%; }
    input { flex: 1; padding: 12px; border-radius: 50px; border: none; background: var(--bg-highlight); color: white; outline: none; }
    button { background: var(--spotify-green); border: none; padding: 12px 24px; border-radius: 50px; color: black; font-weight: bold; cursor: pointer; }
    .section-title { font-size: 24px; margin-top: 30px; border-bottom: 1px solid var(--bg-highlight); padding-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 15px; }
    .card { background: var(--bg-surface); padding: 15px; border-radius: 8px; transition: background 0.3s; cursor: pointer; position: relative; }
    .card:hover { background: var(--bg-highlight); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
    .card-title { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
    .badge { position: absolute; top: 10px; right: 10px; background: #e91429; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    #detail-view { display: none; background: var(--bg-surface); padding: 25px; border-radius: 12px; margin-top: 20px; }
    .detail-header { display: flex; gap: 25px; align-items: center; }
    .detail-header img { width: 200px; height: 200px; border-radius: 8px; object-fit: cover; }
    .track-list { width: 100%; margin-top: 20px; border-collapse: collapse; }
    .track-list th, .track-list td { text-align: left; padding: 12px; border-bottom: 1px solid var(--bg-highlight); }
    .generate-btn { display: inline-block; margin-top: 15px; background: #fff; color: #000; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2>Spotify Engine</h2>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Cari musik...">
      <button onclick="executeSearch()">Cari</button>
    </div>
  </div>

  <div id="main-content">
    <div id="display-area">
      <h1>Dashboard Siap</h1>
      <p>Ketikkan kata kunci pada sidebar dan deploy sukses di Vercel.</p>
    </div>
    
    <div id="detail-view"></div>
  </div>

  <script>
    async function executeSearch() {
      const query = document.getElementById('search-input').value;
      if (!query) return;
      
      const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
      const data = await res.json();
      
      let html = `<h1>Hasil untuk "${query}"</h1>`;
      
      if(data.tracks?.length > 0) {
        html += `<div class="section-title">Lagu</div><div class="grid">`;
        data.tracks.forEach(t => {
          html += `
            <div class="card" onclick="viewDetail('track', '${t.id}')">
              ${t.explicit ? '<span class="badge">EXPLICIT</span>' : ''}
              <img src="${t.album?.images[0]?.url || 'https://via.placeholder.com/150'}" />
              <div class="card-title">${t.name}</div>
              <div class="card-sub">${t.artists.map(a=>a.name).join(', ')}</div>
            </div>`;
        });
        html += `</div>`;
      }

      if(data.albums?.length > 0) {
        html += `<div class="section-title">Album</div><div class="grid">`;
        data.albums.forEach(a => {
          html += `
            <div class="card" onclick="viewDetail('album', '${a.id}')">
              <img src="${a.images[0]?.url || 'https://via.placeholder.com/150'}" />
              <div class="card-title">${a.name}</div>
              <div class="card-sub">${a.release_year} • ${a.type}</div>
            </div>`;
        });
        html += `</div>`;
      }

      if(data.artists?.length > 0) {
        html += `<div class="section-title">Artis</div><div class="grid">`;
        data.artists.forEach(art => {
          html += `
            <div class="card" onclick="viewDetail('artist', '${art.id}')">
              <img src="${art.images[0]?.url || 'https://via.placeholder.com/150'}" style="border-radius:50%" />
              <div class="card-title">${art.name}</div>
              <div class="card-sub">Musisi resmi</div>
            </div>`;
        });
        html += `</div>`;
      }

      if(data.playlists?.length > 0) {
        html += `<div class="section-title">Playlist</div><div class="grid">`;
        data.playlists.forEach(pl => {
          html += `
            <div class="card" onclick="viewDetail('playlist', '${pl.id}')">
              <img src="${pl.images[0]?.url || 'https://via.placeholder.com/150'}" />
              <div class="card-title">${pl.name}</div>
              <div class="card-sub">Oleh: ${pl.owner?.display_name || 'System'}</div>
            </div>`;
        });
        html += `</div>`;
      }

      document.getElementById('display-area').innerHTML = html;
      document.getElementById('detail-view').style.display = 'none';
    }

    async function viewDetail(type, id) {
      const res = await fetch(`/api/${type}/${id}`);
      const data = await res.json();
      const detailDiv = document.getElementById('detail-view');
      detailDiv.style.display = 'block';
      
      let html = '';
      
      if (type === 'track') {
        const coverUrl = data.album?.images[0]?.url || '';
        const cardApiUrl = `/api/card?title=${encodeURIComponent(data.name)}&artist=${encodeURIComponent(data.artists[0]?.name)}&cover=${encodeURIComponent(coverUrl)}`;
        
        html = `
          <div class="detail-header">
            <img src="${coverUrl}">
            <div>
              <h2>${data.name} ${data.explicit ? '<span style="color:#e91429; font-size:14px;">[E]</span>':''}</h2>
              <p>Artis: ${data.artists.map(a=>a.name).join(', ')}</p>
              <p>Album: ${data.album?.name} (${data.album?.release_year || ''})</p>
              <p>Play Count: ${data.playcount.toLocaleString()} kali putar</p>
              <p>Durasi: ${(data.duration_ms / 60000).toFixed(2)} Menit</p>
              <a href="${cardApiUrl}" target="_blank" class="generate-btn">Unduh Gambar Card (Sharp)</a>
            </div>
          </div>`;
      } 
      
      else if (type === 'artist') {
        html = `
          <div class="detail-header">
            <img src="${data.images[0]?.url || ''}" style="border-radius:50%">
            <div>
              <h2>${data.name} ${data.verified ? '<span style="color:#1db954">✓ Verified</span>' : ''}</h2>
              <p>Followers: ${data.statistics?.followers.toLocaleString()}</p>
              <p>Pendengar Bulanan: ${data.statistics?.monthly_listeners.toLocaleString()}</p>
            </div>
          </div>
          <h3>Lagu Terpopuler</h3>
          <table class="track-list">
            <thead><tr><th>Judul Lagu</th><th>Album</th><th>Pemutaran</th></tr></thead>
            <tbody>
              ${data.top_tracks.map(t => `<tr><td>${t.name}</td><td>${t.album?.name}</td><td>${t.playcount.toLocaleString()}</td></tr>`).join('')}
            </tbody>
          </table>`;
      } 
      
      else if (type === 'album') {
        html = `
          <div class="detail-header">
            <img src="${data.images[0]?.url || ''}">
            <div>
              <h2>${data.name} [${data.type}]</h2>
              <p>Artis: ${data.artists.map(a=>a.name).join(', ')}</p>
              <p>Rilis: ${data.release_date} • Label: ${data.label || '-'}</p>
            </div>
          </div>
          <h3>Daftar Musik</h3>
          <table class="track-list">
            <thead><tr><th>#</th><th>Judul</th><th>Durasi</th></tr></thead>
            <tbody>
              ${data.tracks.map(t => `<tr><td>${t.track_number}</td><td>${t.name}</td><td>${(t.duration_ms/60000).toFixed(2)} m</td></tr>`).join('')}
            </tbody>
          </table>`;
      } 
      
      else if (type === 'playlist') {
        html = `
          <div class="detail-header">
            <img src="${data.images[0]?.url || ''}">
            <div>
              <h2>${data.name}</h2>
              <p>Deskripsi: ${data.description || '-'}</p>
              <p>Pembuat: ${data.owner?.display_name} (@${data.owner?.username})</p>
              <p>Suka: ${data.followers.toLocaleString()}</p>
            </div>
          </div>
          <h3>Isi Koleksi</h3>
          <table class="track-list">
            <thead><tr><th>Judul Lagu</th><th>Artis</th><th>Album</th></tr></thead>
            <tbody>
              ${data.tracks.map(t => `<tr><td>${t.name}</td><td>${t.artists.map(a=>a.name).join(', ')}</td><td>${t.album?.name}</td></tr>`).join('')}
            </tbody>
          </table>`;
      }
      
      detailDiv.innerHTML = html;
      detailDiv.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
